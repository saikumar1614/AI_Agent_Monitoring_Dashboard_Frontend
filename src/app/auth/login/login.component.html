<div class="auth-page">
  <mat-card class="auth-card">
    <h2>Login</h2>
    <p class="subtitle">Sign in to access the monitoring dashboard.</p>

    <form [formGroup]="loginForm" (ngSubmit)="submit()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" autocomplete="email">
        <mat-error *ngIf="loginForm.controls.email.touched && loginForm.controls.email.invalid">
          Please enter a valid email address.
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input matInput type="password" formControlName="password" autocomplete="current-password">
        <mat-error *ngIf="loginForm.controls.password.touched && loginForm.controls.password.invalid">
          Password must be at least 6 characters.
        </mat-error>
      </mat-form-field>

      <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

      <button mat-raised-button color="primary" class="full-width" type="submit" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <p class="switch-auth">
      No account?
      <a routerLink="/auth/signup">Create one</a>
    </p>
  </mat-card>
</div>
