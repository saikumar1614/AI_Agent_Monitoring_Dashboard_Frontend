<mat-sidenav-container>
  <mat-sidenav #sidenav mode="side" [opened]="sidebarOpen" (openedChange)="onSidebarOpenedChange($event)" class="sidebar">
    <mat-nav-list>
      <h2 matSubheader>MAIN</h2>
      
      <mat-list-item 
        routerLink="/dashboard" 
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </mat-list-item>

      <h2 matSubheader>MONITORING</h2>

      <mat-list-item 
        routerLink="/agents" 
        routerLinkActive="active">
        <mat-icon matListItemIcon>smart_toy</mat-icon>
        <span matListItemTitle>Agents</span>
        <span matListItemLine class="badge">{{ agentCount }}</span>
      </mat-list-item>

      <mat-list-item 
        routerLink="/executions" 
        routerLinkActive="active">
        <mat-icon matListItemIcon>play_circle</mat-icon>
        <span matListItemTitle>Executions</span>
      </mat-list-item>

      <mat-list-item 
        routerLink="/failures" 
        routerLinkActive="active">
        <mat-icon matListItemIcon>error</mat-icon>
        <span matListItemTitle>Failures</span>
        <span matListItemLine class="badge alert">{{ failureCount }}</span>
      </mat-list-item>

      <h2 matSubheader>ANALYTICS</h2>

      <mat-list-item 
        routerLink="/analytics/latency" 
        routerLinkActive="active">
        <mat-icon matListItemIcon>speed</mat-icon>
        <span matListItemTitle>Latency</span>
      </mat-list-item>

      <mat-list-item 
        routerLink="/analytics/tokens" 
        routerLinkActive="active">
        <mat-icon matListItemIcon>trending_up</mat-icon>
        <span matListItemTitle>Token Usage</span>
      </mat-list-item>

      <mat-list-item 
        routerLink="/analytics/cost" 
        routerLinkActive="active">
        <mat-icon matListItemIcon>attach_money</mat-icon>
        <span matListItemTitle>Cost</span>
      </mat-list-item>

      <mat-list-item 
        routerLink="/analytics/performance" 
        routerLinkActive="active">
        <mat-icon matListItemIcon>assessment</mat-icon>
        <span matListItemTitle>Performance</span>
      </mat-list-item>

      <h2 matSubheader>TOOLS</h2>

      <mat-list-item 
        routerLink="/tool-usage" 
        routerLinkActive="active">
        <mat-icon matListItemIcon>build</mat-icon>
        <span matListItemTitle>Tool Usage</span>
      </mat-list-item>

      <h2 matSubheader>SYSTEM</h2>

      <mat-list-item 
        routerLink="/settings" 
        routerLinkActive="active">
        <mat-icon matListItemIcon>settings</mat-icon>
        <span matListItemTitle>Settings</span>
      </mat-list-item>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <ng-content></ng-content>
  </mat-sidenav-content>
</mat-sidenav-container>
