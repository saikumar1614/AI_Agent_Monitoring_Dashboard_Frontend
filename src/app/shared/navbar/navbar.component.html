<mat-toolbar color="primary" class="navbar">
  <div class="navbar-content">
    <div class="navbar-left">
      <button mat-icon-button (click)="toggleSidebar.emit()" class="toggle-btn">
        <mat-icon>menu</mat-icon>
      </button>
      <h1 class="app-title">AI Agent Dashboard</h1>
    </div>

    <div class="navbar-center">
      <div class="search-box">
        <mat-icon>search</mat-icon>
        <input type="text" placeholder="Search agents, executions..." (keyup)="onSearch($event)">
      </div>
    </div>

    <div class="navbar-right">
      <button mat-icon-button [matMenuTriggerFor]="notificationMenu" class="notification-btn">
        <mat-icon [matBadge]="notificationCount" matBadgeColor="accent">notifications</mat-icon>
      </button>

      <mat-menu #notificationMenu="matMenu" class="notification-menu">
        <button mat-menu-item *ngFor="let notification of recentNotifications; let i = index">
          <span>{{ notification.message }}</span>
          <span class="notification-time">{{ notification.time }}</span>
        </button>
        <mat-divider *ngIf="recentNotifications.length > 0"></mat-divider>
        <button mat-menu-item routerLink="/settings">View All Notifications</button>
      </mat-menu>

      <button mat-icon-button [matMenuTriggerFor]="themeMenu" class="theme-btn" matTooltip="Theme">
        <mat-icon>{{ isDarkMode ? 'dark_mode' : 'light_mode' }}</mat-icon>
      </button>

      <mat-menu #themeMenu="matMenu">
        <button mat-menu-item (click)="setTheme('light')">
          <mat-icon>light_mode</mat-icon>
          <span>Light</span>
        </button>
        <button mat-menu-item (click)="setTheme('dark')">
          <mat-icon>dark_mode</mat-icon>
          <span>Dark</span>
        </button>
      </mat-menu>

      <button mat-icon-button [matMenuTriggerFor]="userMenu" class="user-btn">
        <mat-icon>account_circle</mat-icon>
      </button>

      <mat-menu #userMenu="matMenu" class="user-menu">
        <button mat-menu-item>
          <mat-icon>person</mat-icon>
          <span>{{ userName }}</span>
        </button>
        <mat-divider></mat-divider>
        <button mat-menu-item routerLink="/settings">
          <mat-icon>settings</mat-icon>
          <span>Settings</span>
        </button>
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Logout</span>
        </button>
      </mat-menu>
    </div>
  </div>
</mat-toolbar>
